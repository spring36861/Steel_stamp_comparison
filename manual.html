<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鋼印/印鑑半透明比對工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #333;
            color: white;
            font-family: sans-serif;
            overflow: hidden; /* 防止滾動 */
        }
        #controls {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            box-sizing: border-box;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .control-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .control-group label {
            width: 80px;
            font-size: 14px;
        }
        .control-group input[type="range"] {
            flex-grow: 1;
            margin: 0 10px;
        }
        #camera-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        #camera-feed {
            min-width: 100%;
            min-height: 100%;
            object-fit: cover;
        }
        #overlay-image {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1);
            opacity: 0.5; /* 預設半透明度 */
            cursor: move;
            touch-action: none; /* 防止觸控拖曳時觸發瀏覽器預設行為 */
            border: 2px dashed rgba(255, 255, 255, 0.5); /* 加個虛線框讓使用者知道邊界 */
            display: none; /* 初始隱藏，讀取檔案後顯示 */
            max-width: 80vw;
        }
        input[type="file"] {
            width: 100%;
            color: white;
        }
    </style>
</head>
<body>

    <div id="camera-container">
        <video id="camera-feed" autoplay playsinline></video>
        <img id="overlay-image" src="" alt="鋼印圖層">
    </div>

    <div id="controls">
        <div class="control-group">
            <input type="file" id="file-input" accept="image/jpeg, image/png, application/pdf">
        </div>
        <div class="control-group">
            <label>透明度:</label>
            <input type="range" id="opacity-slider" min="0.1" max="1" step="0.05" value="0.5">
            <span id="opacity-val">50%</span>
        </div>
        <div class="control-group">
            <label>圖片縮放:</label>
            <input type="range" id="scale-slider" min="0.1" max="3" step="0.1" value="1">
            <span id="scale-val">1.0x</span>
        </div>
    </div>

    <script>
        // 設定 PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        const video = document.getElementById('camera-feed');
        const fileInput = document.getElementById('file-input');
        const overlayImage = document.getElementById('overlay-image');
        const opacitySlider = document.getElementById('opacity-slider');
        const scaleSlider = document.getElementById('scale-slider');
        
        // --- 1. 啟動後置相機 ---
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" } // 強制使用後鏡頭
                });
                video.srcObject = stream;
            } catch (err) {
                console.error("無法存取相機:", err);
                alert("無法開啟相機，請確認瀏覽器權限設定。");
            }
        }
        startCamera();

        // --- 2. 處理檔案上傳 (JPG/PNG & PDF) ---
        fileInput.addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            if (file.type === 'application/pdf') {
                // 處理 PDF 檔案
                const fileReader = new FileReader();
                fileReader.onload = async function() {
                    const typedarray = new Uint8Array(this.result);
                    try {
                        const pdf = await pdfjsLib.getDocument(typedarray).promise;
                        const page = await pdf.getPage(1); // 預設讀取第一頁
                        const viewport = page.getViewport({ scale: 1.5 }); // 設定解析度
                        
                        const canvas = document.createElement('canvas');
                        const context = canvas.getContext('2d');
                        canvas.height = viewport.height;
                        canvas.width = viewport.width;

                        await page.render({ canvasContext: context, viewport: viewport }).promise;
                        
                        // 將 Canvas 轉成圖片 URL 放入 img 標籤
                        overlayImage.src = canvas.toDataURL('image/png');
                        resetOverlay();
                    } catch (error) {
                        alert("PDF 讀取失敗");
                        console.error(error);
                    }
                };
                fileReader.readAsArrayBuffer(file);
            } else if (file.type.startsWith('image/')) {
                // 處理一般圖片
                const fileReader = new FileReader();
                fileReader.onload = function(e) {
                    overlayImage.src = e.target.result;
                    resetOverlay();
                };
                fileReader.readAsDataURL(file);
            } else {
                alert("請上傳 JPG, PNG 或 PDF 格式的檔案。");
            }
        });

        function resetOverlay() {
            overlayImage.style.display = 'block';
            xOffset = 0;
            yOffset = 0;
            scaleSlider.value = 1;
            document.getElementById('scale-val').innerText = '1.0x';
            setTransform(0, 0, 1);
        }

        // --- 3. UI 控制 (透明度與縮放) ---
        opacitySlider.addEventListener('input', function() {
            overlayImage.style.opacity = this.value;
            document.getElementById('opacity-val').innerText = Math.round(this.value * 100) + '%';
        });

        scaleSlider.addEventListener('input', function() {
            currentScale = parseFloat(this.value);
            document.getElementById('scale-val').innerText = currentScale.toFixed(1) + 'x';
            setTransform(currentX, currentY, currentScale);
        });

        // --- 4. 觸控與滑鼠拖曳邏輯 ---
        let isDragging = false;
        let startX, startY;
        let currentX = 0, currentY = 0;
        let xOffset = 0, yOffset = 0;
        let currentScale = 1;

        function setTransform(x, y, scale) {
            // 使用 translate(-50%, -50%) 來保持圖片置中，再加上位移和縮放
            overlayImage.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) scale(${scale})`;
        }

        function dragStart(e) {
            if (e.type === "touchstart") {
                startX = e.touches[0].clientX - xOffset;
                startY = e.touches[0].clientY - yOffset;
            } else {
                startX = e.clientX - xOffset;
                startY = e.clientY - yOffset;
            }
            if (e.target === overlayImage) {
                isDragging = true;
            }
        }

        function dragEnd() {
            isDragging = false;
        }

        function drag(e) {
            if (isDragging) {
                e.preventDefault(); // 防止手機螢幕跟著滑動
                if (e.type === "touchmove") {
                    currentX = e.touches[0].clientX - startX;
                    currentY = e.touches[0].clientY - startY;
                } else {
                    currentX = e.clientX - startX;
                    currentY = e.clientY - startY;
                }
                xOffset = currentX;
                yOffset = currentY;
                setTransform(currentX, currentY, currentScale);
            }
        }

        overlayImage.addEventListener("touchstart", dragStart, false);
        overlayImage.addEventListener("touchend", dragEnd, false);
        overlayImage.addEventListener("touchmove", drag, { passive: false }); // passive: false 才能 preventDefault

        overlayImage.addEventListener("mousedown", dragStart, false);
        window.addEventListener("mouseup", dragEnd, false);
        window.addEventListener("mousemove", drag, false);

    </script>
</body>
</html>
