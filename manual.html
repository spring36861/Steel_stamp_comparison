<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鋼印/印鑑半透明比對工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        body { 
            margin: 0; padding: 0; background-color: #333; color: white; 
            font-family: sans-serif; overflow: hidden; 
            /* 這是防干擾的關鍵，防止手機亂滑動 */
            touch-action: none; 
        }
        #controls { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: rgba(0, 0, 0, 0.85); padding: 15px; 
            box-sizing: border-box; z-index: 100; 
            display: flex; flex-direction: column; gap: 15px; 
        }
        .control-group { display: flex; align-items: center; justify-content: space-between; }
        .control-group label { width: 80px; font-size: 14px; }
        .control-group input[type="range"] { flex-grow: 1; margin: 0 10px; }
        
        /* 將相機容器設為全螢幕，並作為觸控的主要接收區 */
        #camera-container { 
            position: absolute; top: 0; left: 0; 
            width: 100vw; height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
            overflow: hidden; z-index: 1;
        }
        #camera-feed { min-width: 100%; min-height: 100%; object-fit: cover; }
        
        #overlay-image {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(1);
            opacity: 0.5; cursor: move;
            border: 2px dashed rgba(255, 255, 255, 0.7);
            display: none; max-width: 80vw;
            /* 確保縮放時是以圖片正中心為基準 */
            transform-origin: center center; 
            pointer-events: none; /* 讓觸控事件穿透圖片，直接交給容器處理 */
        }
        input[type="file"] { width: 100%; color: white; font-size: 16px; }
    </style>
</head>
<body>

    <div id="camera-container">
        <video id="camera-feed" autoplay playsinline></video>
        <img id="overlay-image" src="" alt="鋼印圖層">
    </div>

    <div id="controls">
        <div class="control-group">
            <input type="file" id="file-input" accept="image/jpeg, image/png, application/pdf">
        </div>
        <div class="control-group">
            <label>透明度:</label>
            <input type="range" id="opacity-slider" min="0.1" max="1" step="0.05" value="0.5">
            <span id="opacity-val">50%</span>
        </div>
        </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        const video = document.getElementById('camera-feed');
        const fileInput = document.getElementById('file-input');
        const overlayImage = document.getElementById('overlay-image');
        const opacitySlider = document.getElementById('opacity-slider');
        const cameraContainer = document.getElementById('camera-container');
        
        // --- 1. 啟動後置相機 ---
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
            } catch (err) { alert("無法開啟相機，請確認瀏覽器權限設定。"); }
        }
        startCamera();

        // --- 2. 處理檔案上傳 ---
        fileInput.addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            if (file.type === 'application/pdf') {
                const fileReader = new FileReader();
                fileReader.onload = async function() {
                    const typedarray = new Uint8Array(this.result);
                    try {
                        const pdf = await pdfjsLib.getDocument(typedarray).promise;
                        const page = await pdf.getPage(1);
                        const viewport = page.getViewport({ scale: 2.0 }); // 提高解析度讓放大不失真
                        const canvas = document.createElement('canvas');
                        const context = canvas.getContext('2d');
                        canvas.height = viewport.height; canvas.width = viewport.width;
                        await page.render({ canvasContext: context, viewport: viewport }).promise;
                        overlayImage.src = canvas.toDataURL('image/png');
                        resetOverlay();
                    } catch (error) { alert("PDF 讀取失敗"); }
                };
                fileReader.readAsArrayBuffer(file);
            } else if (file.type.startsWith('image/')) {
                const fileReader = new FileReader();
                fileReader.onload = function(e) { overlayImage.src = e.target.result; resetOverlay(); };
                fileReader.readAsDataURL(file);
            }
        });

        function resetOverlay() {
            overlayImage.style.display = 'block';
            xOffset = 0; yOffset = 0; currentX = 0; currentY = 0;
            currentScale = 1;
            setTransform(0, 0, 1);
        }

        // --- 3. 透明度控制 ---
        opacitySlider.addEventListener('input', function() {
            overlayImage.style.opacity = this.value;
            document.getElementById('opacity-val').innerText = Math.round(this.value * 100) + '%';
        });

        // --- 4. 全螢幕手勢邏輯 (單指拖曳 + 雙指縮放) ---
        let isDragging = false;
        let startX, startY;
        let currentX = 0, currentY = 0;
        let xOffset = 0, yOffset = 0;
        let currentScale = 1;
        
        let initialPinchDistance = null;
        let initialScale = 1;

        function setTransform(x, y, scale) {
            overlayImage.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) scale(${scale})`;
        }

        function getDistance(touches) {
            return Math.hypot(touches[0].clientX - touches[1].clientX, touches[0].clientY - touches[1].clientY);
        }

        // 將監聽器綁定在整個相機容器上
        cameraContainer.addEventListener("touchstart", function(e) {
            if (e.touches.length === 1) {
                isDragging = true;
                startX = e.touches[0].clientX - xOffset;
                startY = e.touches[0].clientY - yOffset;
            } else if (e.touches.length === 2) {
                isDragging = false; 
                initialPinchDistance = getDistance(e.touches);
                initialScale = currentScale;
            }
        }, { passive: false });

        cameraContainer.addEventListener("touchmove", function(e) {
            e.preventDefault(); // 阻擋預設滾動行為
            
            if (e.touches.length === 1 && isDragging) {
                currentX = e.touches[0].clientX - startX;
                currentY = e.touches[0].clientY - startY;
                xOffset = currentX;
                yOffset = currentY;
                setTransform(currentX, currentY, currentScale);
                
            } else if (e.touches.length === 2 && initialPinchDistance) {
                const currentDistance = getDistance(e.touches);
                const scaleDelta = currentDistance / initialPinchDistance;
                
                // 限制縮放倍率 (0.1倍 ~ 5.0倍)
                currentScale = Math.min(Math.max(0.1, initialScale * scaleDelta), 5);
                setTransform(currentX, currentY, currentScale);
            }
        }, { passive: false });

        cameraContainer.addEventListener("touchend", function(e) {
            if (e.touches.length < 2) {
                initialPinchDistance = null;
            }
            if (e.touches.length === 1) {
                isDragging = true;
                startX = e.touches[0].clientX - xOffset;
                startY = e.touches[0].clientY - yOffset;
            } else if (e.touches.length === 0) {
                isDragging = false;
            }
        }, { passive: false });

    </script>
</body>
</html>
