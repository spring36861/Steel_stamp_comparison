<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鋼印/印鑑半透明比對工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #333; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; /* 防止原生手勢干擾 */ }
        #controls { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0, 0, 0, 0.8); padding: 15px; box-sizing: border-box; z-index: 100; display: flex; flex-direction: column; gap: 10px; }
        .control-group { display: flex; align-items: center; justify-content: space-between; }
        .control-group label { width: 80px; font-size: 14px; }
        .control-group input[type="range"] { flex-grow: 1; margin: 0 10px; }
        #camera-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        #camera-feed { min-width: 100%; min-height: 100%; object-fit: cover; }
        #overlay-image {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(1);
            opacity: 0.5; cursor: move;
            border: 2px dashed rgba(255, 255, 255, 0.5);
            display: none; max-width: 80vw;
            transform-origin: center center; /* 確保從中心點縮放 */
        }
        input[type="file"] { width: 100%; color: white; }
    </style>
</head>
<body>

    <div id="camera-container">
        <video id="camera-feed" autoplay playsinline></video>
        <img id="overlay-image" src="" alt="鋼印圖層">
    </div>

    <div id="controls">
        <div class="control-group">
            <input type="file" id="file-input" accept="image/jpeg, image/png, application/pdf">
        </div>
        <div class="control-group">
            <label>透明度:</label>
            <input type="range" id="opacity-slider" min="0.1" max="1" step="0.05" value="0.5">
            <span id="opacity-val">50%</span>
        </div>
        <div class="control-group">
            <label>圖片縮放:</label>
            <input type="range" id="scale-slider" min="0.1" max="3" step="0.1" value="1">
            <span id="scale-val">1.0x</span>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        const video = document.getElementById('camera-feed');
        const fileInput = document.getElementById('file-input');
        const overlayImage = document.getElementById('overlay-image');
        const opacitySlider = document.getElementById('opacity-slider');
        const scaleSlider = document.getElementById('scale-slider');
        
        // --- 1. 啟動後置相機 ---
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
            } catch (err) { alert("無法開啟相機，請確認瀏覽器權限設定。"); }
        }
        startCamera();

        // --- 2. 處理檔案上傳 ---
        fileInput.addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            if (file.type === 'application/pdf') {
                const fileReader = new FileReader();
                fileReader.onload = async function() {
                    const typedarray = new Uint8Array(this.result);
                    try {
                        const pdf = await pdfjsLib.getDocument(typedarray).promise;
                        const page = await pdf.getPage(1);
                        const viewport = page.getViewport({ scale: 1.5 });
                        const canvas = document.createElement('canvas');
                        const context = canvas.getContext('2d');
                        canvas.height = viewport.height; canvas.width = viewport.width;
                        await page.render({ canvasContext: context, viewport: viewport }).promise;
                        overlayImage.src = canvas.toDataURL('image/png');
                        resetOverlay();
                    } catch (error) { alert("PDF 讀取失敗"); }
                };
                fileReader.readAsArrayBuffer(file);
            } else if (file.type.startsWith('image/')) {
                const fileReader = new FileReader();
                fileReader.onload = function(e) { overlayImage.src = e.target.result; resetOverlay(); };
                fileReader.readAsDataURL(file);
            }
        });

        function resetOverlay() {
            overlayImage.style.display = 'block';
            xOffset = 0; yOffset = 0; currentX = 0; currentY = 0;
            currentScale = 1; scaleSlider.value = 1;
            document.getElementById('scale-val').innerText = '1.0x';
            setTransform(0, 0, 1);
        }

        // --- 3. UI 控制 (透明度與滑桿縮放同步) ---
        opacitySlider.addEventListener('input', function() {
            overlayImage.style.opacity = this.value;
            document.getElementById('opacity-val').innerText = Math.round(this.value * 100) + '%';
        });

        scaleSlider.addEventListener('input', function() {
            currentScale = parseFloat(this.value);
            document.getElementById('scale-val').innerText = currentScale.toFixed(1) + 'x';
            setTransform(currentX, currentY, currentScale);
        });

        // --- 4. 觸控與手勢邏輯 (單指拖曳 + 雙指縮放) ---
        let isDragging = false;
        let startX, startY;
        let currentX = 0, currentY = 0;
        let xOffset = 0, yOffset = 0;
        let currentScale = 1;
        
        // 雙指縮放專用變數
        let initialPinchDistance = null;
        let initialScale = 1;

        function setTransform(x, y, scale) {
            overlayImage.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) scale(${scale})`;
        }

        // 計算兩根手指之間的直線距離
        function getDistance(touches) {
            return Math.hypot(touches[0].clientX - touches[1].clientX, touches[0].clientY - touches[1].clientY);
        }

        function touchStart(e) {
            if (e.touches.length === 1) {
                // 單指：開始拖曳
                isDragging = true;
                startX = e.touches[0].clientX - xOffset;
                startY = e.touches[0].clientY - yOffset;
            } else if (e.touches.length === 2) {
                // 雙指：開始縮放
                isDragging = false; // 暫停拖曳避免畫面亂跳
                initialPinchDistance = getDistance(e.touches);
                initialScale = currentScale;
            }
        }

        function touchMove(e) {
            e.preventDefault(); // 絕對需要：防止手機螢幕跟著滑動或觸發下拉更新
            
            if (e.touches.length === 1 && isDragging) {
                // 單指拖曳中
                currentX = e.touches[0].clientX - startX;
                currentY = e.touches[0].clientY - startY;
                xOffset = currentX;
                yOffset = currentY;
                setTransform(currentX, currentY, currentScale);
                
            } else if (e.touches.length === 2 && initialPinchDistance) {
                // 雙指縮放中
                const currentDistance = getDistance(e.touches);
                const scaleDelta = currentDistance / initialPinchDistance;
                
                // 計算新比例，並限制在 0.1 到 3 倍之間
                currentScale = Math.min(Math.max(0.1, initialScale * scaleDelta), 3);
                
                // 同步更新下方的滑桿 UI
                scaleSlider.value = currentScale;
                document.getElementById('scale-val').innerText = currentScale.toFixed(1) + 'x';
                
                setTransform(currentX, currentY, currentScale);
            }
        }

        function touchEnd(e) {
            if (e.touches.length < 2) {
                initialPinchDistance = null; // 結束縮放狀態
            }
            if (e.touches.length === 1) {
                // 如果放開一根手指剩下一根，無縫切換回拖曳模式
                isDragging = true;
                startX = e.touches[0].clientX - xOffset;
                startY = e.touches[0].clientY - yOffset;
            } else if (e.touches.length === 0) {
                isDragging = false;
            }
        }

        // 綁定觸控事件
        overlayImage.addEventListener("touchstart", touchStart, { passive: false });
        overlayImage.addEventListener("touchmove", touchMove, { passive: false });
        overlayImage.addEventListener("touchend", touchEnd, { passive: false });
        overlayImage.addEventListener("touchcancel", touchEnd, { passive: false });

        // 保留電腦版滑鼠拖曳相容性
        overlayImage.addEventListener("mousedown", (e) => {
            isDragging = true; startX = e.clientX - xOffset; startY = e.clientY - yOffset;
        });
        window.addEventListener("mouseup", () => isDragging = false);
        window.addEventListener("mousemove", (e) => {
            if (!isDragging) return;
            e.preventDefault();
            currentX = e.clientX - startX; currentY = e.clientY - startY;
            xOffset = currentX; yOffset = currentY;
            setTransform(currentX, currentY, currentScale);
        });

    </script>
</body>
</html>
